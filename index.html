<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cake AR</title>
</head>

<body>

<script>

const glb = "cake.glb";
const usdz = "cake.usdz";

const android = /Android/i.test(navigator.userAgent);
const iphone = /iPhone|iPad|iPod/i.test(navigator.userAgent);

if (android) {

window.location.href =
"https://arvr.google.com/scene-viewer/1.0?file=" +
encodeURIComponent(window.location.origin + "/" + glb) +
"&mode=ar_preferred";

}

else if (iphone) {

window.location.href = usdz;

}

else {

document.body.innerHTML =
"<h2>Open this QR link on your phone</h2>";

}

</script>

</body>
</html>
